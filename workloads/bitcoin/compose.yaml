# Two Bitcoin Core regtest nodes, a miner that produces one block every
# interval and writes hashes back to the hypervisor feedback buffer, and a
# shutdown trigger that issues bedrock's VMCALL after a sleep.
#
# Each container runs in its own network namespace and joins podman's
# default bridge network. aardvark-dns resolves container_name as a
# hostname, so bitcoind2 attaches to bitcoind1's p2p port via
# `-addnode=bitcoind1:18444` and the miner reaches bitcoind1's RPC via
# `-rpcconnect=bitcoind1`. Determinism of IP/MAC assignment is provided by
# the bedrock hypervisor (virtualized TSC, RDRAND, interrupts), not by
# pinning here.
#
# All four images come from images.tar (built by ./build.sh) — never pulled.
# `image:` refs use bare names (no `docker.io/` registry prefix) so podman's
# fallback resolution finds the `localhost/...` tags it adds at load time.

services:
  bitcoind1:
    image: bitcoin/bitcoin:latest
    pull_policy: never
    container_name: bitcoind1
    command:
      - -regtest
      - -server
      - -rpcuser=user
      - -rpcpassword=password
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18443
      - -port=18444
      - -listen=1
      - -listenonion=0
      - -fallbackfee=0.0001
      - -printtoconsole
      - -debug
      - -debugexclude=libevent
      - -debugexclude=leveldb

  bitcoind2:
    image: bitcoin/bitcoin:latest
    pull_policy: never
    container_name: bitcoind2
    command:
      - -regtest
      - -server
      - -rpcuser=user
      - -rpcpassword=password
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18455
      - -port=18456
      - -listen=1
      - -listenonion=0
      - -fallbackfee=0.0001
      - -printtoconsole
      - -addnode=bitcoind1:18444
      - -debug
      - -debugexclude=libevent
      - -debugexclude=leveldb
    depends_on:
      - bitcoind1

  miner:
    image: bedrock/bitcoin-miner:latest
    pull_policy: never
    container_name: miner
    privileged: true  # Required for VMCALL
    command: ["600"]  # Sleep interval in seconds (10 minutes)
    depends_on:
      - bitcoind1

  shutdown:
    image: bedrock/shutdown:latest
    pull_policy: never
    container_name: shutdown
    privileged: true  # Required for VMCALL
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Signaling VM ready..."
        /usr/local/bin/bedrock-shutdown --ready
        echo "Shutdown waiting 60 minutes before VMCALL..."
        sleep 3600
        echo "Initiating VM shutdown..."
        exec /usr/local/bin/bedrock-shutdown
    depends_on:
      - miner
