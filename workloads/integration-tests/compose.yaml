# Integration-tests workload: an idle container that signals the bedrock VM
# ready, plus two coverage containers the coverage tests exec drivers into.
#
# The podman initrd (nix/podman-initrd.nix) loads bedrock-io.ko before
# bringing this up, so once the containers are running the deterministic I/O
# channel is live and the lab can drive bash commands at `host` or at any
# container. Only `idle` signals ready (one ready hypercall is enough to take
# the boot checkpoint); the coverage containers just idle so the lab can exec
# into them. No container shuts the VM down on its own — the lab owns lifetime
# and tears the tree down when the test process exits.
#
# The images come from images.tar (built by ./build.sh) — never pulled.

services:
  idle:
    image: bedrock/integration-tests-ready:latest
    pull_policy: never
    container_name: idle
    privileged: true  # Required for VMCALL
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /usr/local/bin/bedrock-ready
        echo "integration-tests: ready signaled, idling"
        sleep infinity

  # Edge coverage via LLVM trace-pc-guard (guest/libpcguard.c -> libfeedback.c).
  # Idles; the coverage test execs /opt/bedrock/drivers/cov_pcguard, which
  # registers a feedback buffer the lab reads back.
  coverage-pcguard:
    image: bedrock/integration-tests-coverage-pcguard:latest
    pull_policy: never
    container_name: coverage-pcguard
    privileged: true  # Required for VMCALL
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sleep infinity

  # Edge coverage via the Antithesis Go SDK (guest/libvoidstar.c -> libfeedback.c).
  # Idles; the coverage test execs /opt/bedrock/drivers/cov_go, which registers a
  # feedback buffer the lab reads back.
  coverage-go:
    image: bedrock/integration-tests-coverage-go:latest
    pull_policy: never
    container_name: coverage-go
    privileged: true  # Required for VMCALL
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sleep infinity
