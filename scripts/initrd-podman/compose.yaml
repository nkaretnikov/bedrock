# Two Bitcoin Core nodes in regtest mode using host networking
#
# Node1: P2P port 18444, RPC port 18443
# Node2: P2P port 18456, RPC port 18455, connects to Node1
# Miner: Generates 1 block every 10 minutes to Node1

services:
  bitcoind1:
    image: docker.io/bitcoin/bitcoin:latest
    pull_policy: never
    container_name: bitcoind1
    network_mode: host
    command:
      - -regtest
      - -server
      - -rpcuser=user
      - -rpcpassword=password
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18443
      - -port=18444
      - -listen=1
      - -listenonion=0
      - -fallbackfee=0.0001
      - -printtoconsole
      - -debug
      - -debugexclude=libevent
      - -debugexclude=leveldb

  bitcoind2:
    image: docker.io/bitcoin/bitcoin:latest
    pull_policy: never
    container_name: bitcoind2
    network_mode: host
    command:
      - -regtest
      - -server
      - -rpcuser=user
      - -rpcpassword=password
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18455
      - -port=18456
      - -listen=1
      - -listenonion=0
      - -fallbackfee=0.0001
      - -printtoconsole
      - -addnode=127.0.0.1:18444
      - -debug
      - -debugexclude=libevent
      - -debugexclude=leveldb
    depends_on:
      - bitcoind1

  miner:
    image: docker.io/bitcoin/bitcoin:latest
    pull_policy: never
    container_name: miner
    network_mode: host
    privileged: true  # Required for VMCALL instruction
    volumes:
      - /usr/local/bin/bedrock-miner:/bedrock-miner:ro
      # Driver scripts the deterministic I/O channel enumerates via
      # ACTION_GET_WORKLOAD_DETAILS. Anything user-executable here
      # appears in the workload listing and becomes a fuzz target.
      - /usr/local/share/bedrock-drivers:/opt/bedrock/drivers:ro
    entrypoint: ["/bedrock-miner"]
    command: ["600"]  # Sleep interval in seconds (10 minutes)
    depends_on:
      - bitcoind1

  # Shutdown service - calls bedrock VMCALL shutdown after workload completes
  shutdown:
    image: docker.io/bitcoin/bitcoin:latest
    pull_policy: never
    container_name: shutdown
    network_mode: host
    privileged: true
    volumes:
      - /usr/local/bin/bedrock-shutdown:/bedrock-shutdown:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Shutdown service waiting 60 minutes before shutdown..."
        sleep 3600
        echo "Initiating VM shutdown via VMCALL hypercall..."
        exec /bedrock-shutdown
    depends_on:
      - miner
